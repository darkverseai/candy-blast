<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Candy Blast</title>

<style>
body{
margin:0;
padding:0;
background:#24003d;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
color:white;
overflow:hidden;
}

h1{
margin-top:20px;
font-size:50px;
color:#00f7ff;
text-shadow:0 0 20px #00f7ff;
}

#score{
font-size:35px;
margin:15px;
}

#board{
width:90vw;
max-width:520px;
height:90vw;
max-height:520px;
display:grid;
grid-template-columns:repeat(8,1fr);
gap:5px;
background:#111;
padding:10px;
border-radius:25px;
box-shadow:0 0 25px cyan;
}

.candy{
width:100%;
aspect-ratio:1;
border-radius:18px;
cursor:pointer;
transition:0.2s;
}

.red{background:#ff4d4d;}
.blue{background:#4da6ff;}
.green{background:#4dff88;}
.yellow{background:#ffe44d;}
.purple{background:#c44dff;}
.orange{background:#ff944d;}

.selected{
outline:4px solid white;
transform:scale(1.08);
}

</style>
</head>

<body>

<h1>🍬 Candy Blast</h1>
<div id="score">Score: 0</div>

<div id="board"></div>

<script>

const board = document.getElementById("board");
const scoreText = document.getElementById("score");

const width = 8;
let score = 0;

const colors = [
"red",
"blue",
"green",
"yellow",
"purple",
"orange"
];

let squares = [];
let firstCandy = null;
let secondCandy = null;

function createBoard(){

for(let i=0;i<width*width;i++){

const square = document.createElement("div");

let randomColor =
colors[Math.floor(Math.random()*colors.length)];

square.classList.add("candy");
square.classList.add(randomColor);

square.setAttribute("draggable",true);
square.setAttribute("id",i);

board.appendChild(square);

squares.push(square);

square.addEventListener("click", ()=>selectCandy(square));

}

}

function selectCandy(square){

if(firstCandy === null){

firstCandy = square;
square.classList.add("selected");

}else{

secondCandy = square;

swapCandies();

firstCandy.classList.remove("selected");

firstCandy = null;
secondCandy = null;

}

}

function swapCandies(){

const temp = [...firstCandy.classList].find(c=>colors.includes(c));

const temp2 = [...secondCandy.classList].find(c=>colors.includes(c));

firstCandy.classList.remove(temp);
secondCandy.classList.remove(temp2);

firstCandy.classList.add(temp2);
secondCandy.classList.add(temp);

}

function checkRowForThree(){

for(let i=0;i<61;i++){

const row = [i,i+1,i+2];

const decidedColor =
getColor(i);

const notValid = [6,7,14,15,22,23,30,31,38,39,46,47,54,55];

if(notValid.includes(i)) continue;

if(row.every(index=>getColor(index)===decidedColor)){

row.forEach(index=>{
setColor(index,"");
});

score += 3;
scoreText.innerHTML = "Score: " + score;

}

}

}

function checkColumnForThree(){

for(let i=0;i<48;i++){

const column = [i,i+8,i+16];

const decidedColor =
getColor(i);

if(column.every(index=>getColor(index)===decidedColor)){

column.forEach(index=>{
setColor(index,"");
});

score += 3;
scoreText.innerHTML = "Score: " + score;

}

}

}

function moveDown(){

for(let i=0;i<56;i++){

if(getColor(i+8)===""){

setColor(i+8,getColor(i));
setColor(i,"");

}

}

for(let i=0;i<8;i++){

if(getColor(i)===""){

let randomColor =
colors[Math.floor(Math.random()*colors.length)];

setColor(i,randomColor);

}

}

}

function getColor(index){

return colors.find(color=>
squares[index].classList.contains(color)
) || "";

}

function setColor(index,color){

colors.forEach(c=>squares[index].classList.remove(c));

if(color!==""){
squares[index].classList.add(color);
}

}

window.setInterval(()=>{

checkRowForThree();
checkColumnForThree();
moveDown();

},200);

createBoard();

</script>

</body>
</html>
