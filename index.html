<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candy Blast Swipe</title>

<style>

body{
margin:0;
padding:0;
background:linear-gradient(#ffb6e6,#b266ff);
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
overflow:hidden;
}

h1{
color:white;
font-size:50px;
margin:15px;
text-shadow:0 0 15px #ff00ff;
}

.top{
width:90%;
max-width:500px;
display:flex;
justify-content:space-between;
color:white;
font-size:25px;
font-weight:bold;
margin-bottom:10px;
}

#board{
width:95vw;
max-width:500px;
height:95vw;
max-height:500px;
background:#24104d;
display:grid;
grid-template-columns:repeat(8,1fr);
gap:5px;
padding:8px;
border-radius:25px;
box-shadow:0 0 25px #ff00ff;
touch-action:none;
}

.candy{
width:100%;
aspect-ratio:1;
border-radius:18px;
transition:0.15s;
}

.red{background:#ff4d4d;}
.blue{background:#4da6ff;}
.green{background:#4dff88;}
.yellow{background:#ffe44d;}
.purple{background:#c44dff;}
.orange{background:#ff944d;}

#popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:30px;
border-radius:25px;
display:none;
z-index:10;
text-align:center;
}

#popup h2{
color:#ff1493;
}

#popup button{
padding:12px 25px;
border:none;
border-radius:12px;
background:#ff1493;
color:white;
font-size:18px;
}

</style>
</head>

<body>

<h1>🍬 Candy Blast</h1>

<div class="top">
<div>Moves: <span id="moves">15</span></div>
<div>Score: <span id="score">0</span></div>
</div>

<div id="board"></div>

<div id="popup">
<h2 id="result"></h2>
<button onclick="restartGame()">Play Again</button>
</div>

<script>

const board = document.getElementById("board");

const width = 8;

const colors = [
"red",
"blue",
"green",
"yellow",
"purple",
"orange"
];

let squares = [];

let score = 0;
let moves = 15;

let startId = null;
let endId = null;

function createBoard(){

board.innerHTML="";
squares=[];

for(let i=0;i<64;i++){

const square=document.createElement("div");

const color=
colors[Math.floor(Math.random()*colors.length)];

square.classList.add("candy");
square.classList.add(color);

square.setAttribute("draggable",true);
square.setAttribute("id",i);

board.appendChild(square);

squares.push(square);

square.addEventListener("dragstart",dragStart);

square.addEventListener("dragover",e=>e.preventDefault());

square.addEventListener("drop",dragDrop);

square.addEventListener("dragend",dragEnd);

}

}

function dragStart(){

startId=parseInt(this.id);

}

function dragDrop(){

endId=parseInt(this.id);

}

function dragEnd(){

const validMoves=[
startId-1,
startId+1,
startId-width,
startId+width
];

if(validMoves.includes(endId)){

swapColors(startId,endId);

moves--;

document.getElementById("moves").innerText=moves;

setTimeout(()=>{

checkMatches();

if(score>=100){

showPopup("🎉 YOU WIN!");

}

if(moves<=0 && score<100){

showPopup("😢 YOU LOSE");

}

},200);

}

}

function swapColors(id1,id2){

const color1=getColor(id1);
const color2=getColor(id2);

setColor(id1,color2);
setColor(id2,color1);

}

function getColor(id){

return colors.find(c=>
squares[id].classList.contains(c)
);

}

function setColor(id,color){

colors.forEach(c=>
squares[id].classList.remove(c)
);

squares[id].classList.add(color);

}

function checkMatches(){

checkRows();
checkColumns();

}

function checkRows(){

for(let i=0;i<61;i++){

const invalid=[
6,7,14,15,22,23,
30,31,38,39,46,
47,54,55
];

if(invalid.includes(i)) continue;

const row=[i,i+1,i+2];

const color=getColor(i);

if(row.every(index=>getColor(index)===color)){

row.forEach(index=>{

const random=
colors[Math.floor(Math.random()*colors.length)];

setColor(index,random);

});

score += 10;

document.getElementById("score").innerText=score;

}

}

}

function checkColumns(){

for(let i=0;i<48;i++){

const column=[i,i+8,i+16];

const color=getColor(i);

if(column.every(index=>getColor(index)===color)){

column.forEach(index=>{

const random=
colors[Math.floor(Math.random()*colors.length)];

setColor(index,random);

});

score += 10;

document.getElementById("score").innerText=score;

}

}

}

function showPopup(text){

document.getElementById("popup").style.display="block";

document.getElementById("result").innerText=text;

}

function restartGame(){

score=0;
moves=15;

document.getElementById("score").innerText=0;

document.getElementById("moves").innerText=15;

document.getElementById("popup").style.display="none";

createBoard();

}

createBoard();

</script>

</body>
</html>
