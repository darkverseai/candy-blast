<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candy Blast Ultimate</title>

<style>

body{
margin:0;
padding:0;
background:linear-gradient(#ffb6e6,#9d4dff);
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
overflow:hidden;
}

h1{
color:white;
font-size:45px;
margin:15px;
text-shadow:0 0 15px #ff00ff;
}

.top{
width:90%;
max-width:500px;
display:flex;
justify-content:space-between;
color:white;
font-size:24px;
font-weight:bold;
margin-bottom:10px;
}

#board{
width:95vw;
max-width:500px;
height:95vw;
max-height:500px;
display:grid;
grid-template-columns:repeat(8,1fr);
gap:5px;
background:#24104d;
padding:8px;
border-radius:25px;
box-shadow:0 0 25px #ff00ff;
}

.candy{
width:100%;
aspect-ratio:1;
border-radius:18px;
transition:0.2s;
}

.red{background:#ff4d4d;}
.blue{background:#4da6ff;}
.green{background:#4dff88;}
.yellow{background:#ffe44d;}
.purple{background:#c44dff;}
.orange{background:#ff944d;}

.selected{
outline:4px solid white;
transform:scale(1.08);
}

#popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:30px;
border-radius:25px;
display:none;
z-index:100;
text-align:center;
box-shadow:0 0 30px black;
}

#popup h2{
color:#ff1493;
margin:0;
}

#popup button{
margin-top:20px;
padding:12px 25px;
border:none;
background:#ff1493;
color:white;
border-radius:12px;
font-size:18px;
}

</style>
</head>

<body>

<h1>🍬 Candy Blast</h1>

<div class="top">
<div>Moves: <span id="moves">20</span></div>
<div>Score: <span id="score">0</span></div>
</div>

<div id="board"></div>

<div id="popup">
<h2 id="popupText"></h2>
<button onclick="restartGame()">
Play Again
</button>
</div>

<script>
const board = document.getElementById("board");
const scoreText = document.getElementById("score");
const movesText = document.getElementById("moves");

const size = 8;
const colors = ["red","blue","green","yellow","purple","orange"];

let score = 0;
let moves = 20;

let candies = [];

function randomColor() {
  return colors[Math.floor(Math.random() * colors.length)];
}

function createBoard() {
  board.innerHTML = "";
  candies = [];

  for(let row=0; row<size; row++) {
    candies[row] = [];

    for(let col=0; col<size; col++) {
      const candy = document.createElement("div");
      candy.classList.add("candy");

      const color = randomColor();

      candy.style.background = color;
      candy.dataset.row = row;
      candy.dataset.col = col;

      addSwipe(candy);

      board.appendChild(candy);

      candies[row][col] = color;
    }
  }
}

function renderBoard() {
  const all = document.querySelectorAll(".candy");

  all.forEach(candy => {
    const row = candy.dataset.row;
    const col = candy.dataset.col;

    candy.style.background = candies[row][col];
  });
}

function addSwipe(candy) {
  let startX = 0;
  let startY = 0;

  candy.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  });

  candy.addEventListener("touchend", e => {
    const endX = e.changedTouches[0].clientX;
    const endY = e.changedTouches[0].clientY;

    const dx = endX - startX;
    const dy = endY - startY;

    const row = parseInt(candy.dataset.row);
    const col = parseInt(candy.dataset.col);

    if(Math.abs(dx) > Math.abs(dy)) {
      if(dx > 30) swap(row,col,row,col+1);
      else if(dx < -30) swap(row,col,row,col-1);
    } else {
      if(dy > 30) swap(row,col,row+1,col);
      else if(dy < -30) swap(row,col,row-1,col);
    }
  });
}

function swap(r1,c1,r2,c2) {
  if(r2 < 0 || r2 >= size || c2 < 0 || c2 >= size) return;

  let temp = candies[r1][c1];
  candies[r1][c1] = candies[r2][c2];
  candies[r2][c2] = temp;

  if(checkMatches()) {
    moves--;
    movesText.innerText = moves;

    resolveBoard();
  } else {
    temp = candies[r1][c1];
    candies[r1][c1] = candies[r2][c2];
    candies[r2][c2] = temp;
  }

  renderBoard();
}

function checkMatches() {
  let found = false;

  // horizontal
  for(let row=0; row<size; row++) {
    for(let col=0; col<size-2; col++) {
      let color = candies[row][col];

      if(
        color &&
        color === candies[row][col+1] &&
        color === candies[row][col+2]
      ) {
        candies[row][col] = null;
        candies[row][col+1] = null;
        candies[row][col+2] = null;

        score += 10;
        found = true;
      }
    }
  }

  // vertical
  for(let col=0; col<size; col++) {
    for(let row=0; row<size-2; row++) {
      let color = candies[row][col];

      if(
        color &&
        color === candies[row+1][col] &&
        color === candies[row+2][col]
      ) {
        candies[row][col] = null;
        candies[row+1][col] = null;
        candies[row+2][col] = null;

        score += 10;
        found = true;
      }
    }
  }

  scoreText.innerText = score;

  return found;
}

function dropCandies() {
  for(let col=0; col<size; col++) {
    for(let row=size-1; row>=0; row--) {

      if(candies[row][col] === null) {

        for(let k=row; k>0; k--) {
          candies[k][col] = candies[k-1][col];
        }

        candies[0][col] = randomColor();
      }
    }
  }
}

function resolveBoard() {
  setTimeout(() => {

    dropCandies();
    renderBoard();

    if(checkMatches()) {
      resolveBoard();
    } else {
      renderBoard();

      if(moves <= 0) {
        setTimeout(() => {
          alert("Game Over! Score: " + score);
          location.reload();
        }, 300);
      }
    }

  }, 300);
}

createBoard();
renderBoard();
</script>
