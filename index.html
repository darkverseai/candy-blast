<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candy Blast</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(#ffb6e6,#d291ff);
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
overflow:hidden;
}

h1{
color:white;
font-size:60px;
margin-top:20px;
text-shadow:0 0 20px #ff00ff;
}

.top{
width:90%;
display:flex;
justify-content:space-between;
color:white;
font-size:24px;
font-weight:bold;
margin-bottom:20px;
}

#board{
display:grid;
grid-template-columns:repeat(8,75px);
grid-template-rows:repeat(8,75px);
gap:4px;
background:#2a0050;
padding:10px;
border-radius:25px;
box-shadow:0 0 25px #ff00ff;
touch-action:none;
}

.candy{
width:75px;
height:75px;
border-radius:50%;
cursor:pointer;
transition:0.2s;
}

.red{background:#ff4d4d;}
.blue{background:#4d9cff;}
.green{background:#4dff88;}
.yellow{background:#ffe44d;}
.purple{background:#c04dff;}
.orange{background:#ff9a4d;}

.selected{
outline:5px solid white;
transform:scale(1.1);
}

@media(max-width:700px){
#board{
grid-template-columns:repeat(8,40px);
grid-template-rows:repeat(8,40px);
}

.candy{
width:40px;
height:40px;
}
h1{
font-size:40px;
}
}
</style>
</head>

<body>

<h1>🍬 Candy Blast</h1>

<div class="top">
<div>Moves: <span id="moves">20</span></div>
<div>Score: <span id="score">0</span></div>
</div>

<div id="board"></div>

<script>
const board=document.getElementById("board");
const scoreText=document.getElementById("score");
const movesText=document.getElementById("moves");

const width=8;
const colors=["red","blue","green","yellow","purple","orange"];

let squares=[];
let score=0;
let moves=20;

let firstCandy=null;
let secondCandy=null;

function randomColor(){
return colors[Math.floor(Math.random()*colors.length)];
}

function createBoard(){

for(let i=0;i<width*width;i++){

const candy=document.createElement("div");

let color=randomColor();

candy.classList.add("candy");
candy.classList.add(color);

candy.setAttribute("draggable",true);
candy.setAttribute("id",i);

board.appendChild(candy);
squares.push(candy);

candy.addEventListener("click",selectCandy);

}
}

function selectCandy(){

if(moves<=0)return;

if(firstCandy==null){
firstCandy=this;
this.classList.add("selected");
}
else{

secondCandy=this;

swapCandies();

firstCandy.classList.remove("selected");

firstCandy=null;
secondCandy=null;

}
}

function swapCandies(){

const firstColor=[...firstCandy.classList][1];
const secondColor=[...secondCandy.classList][1];

firstCandy.classList.remove(firstColor);
firstCandy.classList.add(secondColor);

secondCandy.classList.remove(secondColor);
secondCandy.classList.add(firstColor);

const validMove=checkMatches();

if(validMove){

moves--;
movesText.innerText=moves;

setTimeout(()=>{
dropCandies();
},200);

}
else{

firstCandy.classList.remove(secondColor);
firstCandy.classList.add(firstColor);

secondCandy.classList.remove(firstColor);
secondCandy.classList.add(secondColor);

}
}

function checkMatches(){

let matched=false;

for(let i=0;i<64;i++){

const rowMatch=[i,i+1,i+2];

const decidedColor=squares[i].classList[1];

const invalid=[6,7,14,15,22,23,30,31,38,39,46,47,54,55];

if(invalid.includes(i))continue;

if(rowMatch.every(index=>squares[index].classList[1]===decidedColor)){

matched=true;

rowMatch.forEach(index=>{
squares[index].className="candy";
score+=10;
});

}
}

for(let i=0;i<48;i++){

const columnMatch=[i,i+8,i+16];

const decidedColor=squares[i].classList[1];

if(columnMatch.every(index=>squares[index].classList[1]===decidedColor)){

matched=true;

columnMatch.forEach(index=>{
squares[index].className="candy";
score+=10;
});

}
}

scoreText.innerText=score;

return matched;
}

function dropCandies(){

for(let i=55;i>=0;i--){

if(squares[i+8].classList.length===1){

squares[i+8].className=squares[i].className;

squares[i].className="candy";

}
}

for(let i=0;i<8;i++){

if(squares[i].classList.length===1){

let color=randomColor();

squares[i].classList.add(color);

}
}

checkMatches();

if(moves<=0){

setTimeout(()=>{

alert("Game Over! Score: "+score);

location.reload();

},500);

}
}

window.setInterval(()=>{

checkMatches();
dropCandies();

},300);

createBoard();
</script>

</body>
</html>
