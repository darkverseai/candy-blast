<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
background:#f7b3e3;
font-family:Arial;
text-align:center;
overflow:hidden;
}

h1{
color:white;
font-size:45px;
text-shadow:0 0 10px #ff00ff;
}

.top{
display:flex;
justify-content:space-around;
color:white;
font-size:28px;
font-weight:bold;
margin-bottom:10px;
}

#board{
width:95vw;
max-width:500px;
height:95vw;
max-height:500px;
margin:auto;
display:grid;
grid-template-columns:repeat(8,1fr);
gap:5px;
background:#24104d;
padding:8px;
border-radius:25px;
}

.candy{
width:100%;
aspect-ratio:1;
border-radius:18px;
}

.red{background:#ff4d4d;}
.blue{background:#4da6ff;}
.green{background:#4dff88;}
.yellow{background:#ffe44d;}
.purple{background:#c44dff;}
.orange{background:#ff944d;}

</style>
</head>

<body>

<h1>🍬 Candy Blast</h1>

<div class="top">
<div>Moves: <span id="moves">15</span></div>
<div>Score: <span id="score">0</span></div>
</div>

<div id="board"></div>

<script>

const board = document.getElementById("board");

const colors = [
"red",
"blue",
"green",
"yellow",
"purple",
"orange"
];

const width = 8;

let squares = [];

let score = 0;
let moves = 15;

let first = null;

function createBoard(){

board.innerHTML="";
squares=[];

for(let i=0;i<64;i++){

const square=document.createElement("div");

const color =
colors[Math.floor(Math.random()*colors.length)];

square.classList.add("candy");
square.classList.add(color);

square.id=i;

board.appendChild(square);

squares.push(square);

square.addEventListener("click",()=>handleClick(i));

}

}

function handleClick(id){

if(first===null){

first=id;
squares[id].style.outline="4px solid white";

}else{

swap(first,id);

squares[first].style.outline="none";

first=null;

moves--;

document.getElementById("moves").innerText=moves;

checkAll();

}

}

function swap(a,b){

let colorA=getColor(a);
let colorB=getColor(b);

setColor(a,colorB);
setColor(b,colorA);

}

function getColor(id){

return colors.find(c=>
squares[id].classList.contains(c)
);

}

function setColor(id,color){

colors.forEach(c=>
squares[id].classList.remove(c)
);

squares[id].classList.add(color);

}

function checkAll(){

checkRows();
checkColumns();

if(score>=100){

setTimeout(()=>{
alert("🎉 YOU WIN!");
restart();
},200);

}

if(moves<=0 && score<100){

setTimeout(()=>{
alert("😢 YOU LOSE");
restart();
},200);

}

}

function checkRows(){

for(let i=0;i<61;i++){

const invalid=[
6,7,14,15,22,23,
30,31,38,39,
46,47,54,55
];

if(invalid.includes(i)) continue;

const row=[i,i+1,i+2];

const color=getColor(i);

if(row.every(index=>getColor(index)===color)){

row.forEach(index=>{

const random=
colors[Math.floor(Math.random()*colors.length)];

setColor(index,random);

});

score += 10;

document.getElementById("score").innerText=score;

}

}

}

function checkColumns(){

for(let i=0;i<48;i++){

const col=[i,i+8,i+16];

const color=getColor(i);

if(col.every(index=>getColor(index)===color)){

col.forEach(index=>{

const random=
colors[Math.floor(Math.random()*colors.length)];

setColor(index,random);

});

score += 10;

document.getElementById("score").innerText=score;

}

}

}

function restart(){

score=0;
moves=15;

document.getElementById("score").innerText=0;

document.getElementById("moves").innerText=15;

createBoard();

}

createBoard();

</script>

</body>
</html>
