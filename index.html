<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candy Blast Pro</title>

<style>

body{
margin:0;
padding:0;
background:linear-gradient(#ffb6e6,#b266ff);
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
overflow:hidden;
}

.topbar{
width:100%;
max-width:500px;
display:flex;
justify-content:space-between;
padding:15px;
box-sizing:border-box;
color:white;
font-weight:bold;
font-size:22px;
}

#board{
width:95vw;
max-width:500px;
height:95vw;
max-height:500px;
background:#1f1147;
padding:8px;
border-radius:25px;
display:grid;
grid-template-columns:repeat(8,1fr);
gap:5px;
box-shadow:0 0 25px #ff66ff;
}

.candy{
width:100%;
aspect-ratio:1;
border-radius:18px;
transition:0.2s;
cursor:pointer;
}
