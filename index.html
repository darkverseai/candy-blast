<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candy Blast Ultimate</title>

<style>

body{
margin:0;
padding:0;
background:linear-gradient(#ffb6e6,#9d4dff);
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
overflow:hidden;
}

h1{
color:white;
font-size:45px;
margin:15px;
text-shadow:0 0 15px #ff00ff;
}

.top{
width:90%;
max-width:500px;
display:flex;
justify-content:space-between;
color:white;
font-size:24px;
font-weight:bold;
margin-bottom:10px;
}

#board{
width:95vw;
max-width:500px;
height:95vw;
max-height:500px;
display:grid;
grid-template-columns:repeat(8,1fr);
gap:5px;
background:#24104d;
padding:8px;
border-radius:25px;
box-shadow:0 0 25px #ff00ff;
}

.candy{
width:100%;
aspect-ratio:1;
border-radius:18px;
transition:0.2s;
}

.red{background:#ff4d4d;}
.blue{background:#4da6ff;}
.green{background:#4dff88;}
.yellow{background:#ffe44d;}
.purple{background:#c44dff;}
.orange{background:#ff944d;}

.selected{
outline:4px solid white;
transform:scale(1.08);
}

#popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:30px;
border-radius:25px;
display:none;
z-index:100;
text-align:center;
box-shadow:0 0 30px black;
}

#popup h2{
color:#ff1493;
margin:0;
}

#popup button{
margin-top:20px;
padding:12px 25px;
border:none;
background:#ff1493;
color:white;
border-radius:12px;
font-size:18px;
}

</style>
</head>

<body>

<h1>🍬 Candy Blast</h1>

<div class="top">
<div>Moves: <span id="moves">20</span></div>
<div>Score: <span id="score">0</span></div>
</div>

<div id="board"></div>

<div id="popup">
<h2 id="popupText"></h2>
<button onclick="restartGame()">
Play Again
</button>
</div>

<script>

const board = document.getElementById("board");

const width = 8;

const colors = [
"red",
"blue",
"green",
"yellow",
"purple",
"orange"
];

let squares = [];

let score = 0;
let moves = 20;

let firstCandy = null;

function createBoard(){

board.innerHTML="";
squares=[];

for(let i=0;i<64;i++){

const square=document.createElement("div");

const randomColor=
colors[Math.floor(Math.random()*colors.length)];

square.classList.add("candy");
square.classList.add(randomColor);

square.id=i;

board.appendChild(square);

squares.push(square);

square.addEventListener("click",()=>{
selectCandy(i);
});

}

}

function selectCandy(id){

if(moves<=0) return;

if(firstCandy===null){

firstCandy=id;

squares[id].classList.add("selected");

}else{

if(isValidMove(firstCandy,id)){

swapCandy(firstCandy,id);

moves--;

document.getElementById("moves").innerText=moves;

setTimeout(()=>{

const matched =
checkMatches();

if(!matched){

swapCandy(firstCandy,id);

}

dropCandies();

checkGame();

},200);

}

squares[firstCandy].classList.remove("selected");

firstCandy=null;

}

}

function isValidMove(a,b){

const valid=[
a-1,
a+1,
a-width,
a+width
];

return valid.includes(b);

}

function swapCandy(a,b){

const colorA=getColor(a);
const colorB=getColor(b);

setColor(a,colorB);
setColor(b,colorA);

}

function getColor(id){

return colors.find(c=>
squares[id].classList.contains(c)
);

}

function setColor(id,color){

colors.forEach(c=>
squares[id].classList.remove(c)
);

if(color){
squares[id].classList.add(color);
}

}

function checkMatches(){

let matched=false;

for(let i=0;i<61;i++){

const invalid=[
6,7,14,15,22,23,
30,31,38,39,
46,47,54,55
];

if(invalid.includes(i)) continue;

const row=[i,i+1,i+2];

const color=getColor(i);

if(color &&
row.every(index=>getColor(index)===color)){

matched=true;

row.forEach(index=>{

setColor(index,"");

});

score += 10;

}

}

for(let i=0;i<48;i++){

const col=[i,i+8,i+16];

const color=getColor(i);

if(color &&
col.every(index=>getColor(index)===color)){

matched=true;

col.forEach(index=>{

setColor(index,"");

});

score += 10;

}

}

document.getElementById("score").innerText=score;

return matched;

}

function dropCandies(){

for(let i=55;i>=0;i--){

if(getColor(i+8)===""){

setColor(i+8,getColor(i));

setColor(i,"");

}

}

for(let i=0;i<8;i++){

if(getColor(i)===""){

const randomColor=
colors[Math.floor(Math.random()*colors.length)];

setColor(i,randomColor);

}

}

setTimeout(()=>{

checkMatches();

},150);

}

function checkGame(){

if(score>=100){

showPopup("🎉 YOU WIN!");

}

if(moves<=0 && score<100){

showPopup("😢 YOU LOSE");

}

}

function showPopup(text){

document.getElementById("popup").style.display="block";

document.getElementById("popupText").innerText=text;

}

function restartGame(){

score=0;
moves=20;

document.getElementById("score").innerText=0;
document.getElementById("moves").innerText=20;

document.getElementById("popup").style.display="none";

createBoard();

}

createBoard();

</script>

</body>
</html>
