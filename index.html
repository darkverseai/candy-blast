<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candy Blast</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(#ffb6e6,#d896ff);
display:flex;
flex-direction:column;
align-items:center;
color:white;
}

h1{
font-size:60px;
margin:20px 0 10px;
text-shadow:0 0 15px hotpink;
}

.top{
width:90%;
display:flex;
justify-content:space-between;
font-size:24px;
font-weight:bold;
margin-bottom:10px;
}

.board{
display:grid;
grid-template-columns:repeat(8,1fr);
gap:4px;
background:#2b0b52;
padding:8px;
border-radius:25px;
touch-action:none;
}

.candy{
width:42px;
height:42px;
border-radius:50%;
}

.red{background:#ff4d4d;}
.blue{background:#4da6ff;}
.green{background:#4dff88;}
.yellow{background:#ffe44d;}
.purple{background:#c44dff;}
.orange{background:#ff994d;}

.selected{
outline:4px solid white;
}
</style>
</head>

<body>

<h1>🍬 Candy Blast</h1>

<div class="top">
<div>Moves: <span id="moves">20</span></div>
<div>Score: <span id="score">0</span></div>
</div>

<div class="board" id="board"></div>

<script>
const board=document.getElementById("board");
const width=8;

const colors=[
"red",
"blue",
"green",
"yellow",
"purple",
"orange"
];

let candies=[];
let score=0;
let moves=20;

let firstCandy=null;

function randomColor(){
return colors[Math.floor(Math.random()*colors.length)];
}

function createBoard(){

for(let i=0;i<64;i++){

const candy=document.createElement("div");
candy.classList.add("candy");

let color=randomColor();
candy.classList.add(color);

candy.setAttribute("data-id",i);

board.appendChild(candy);
candies.push(candy);

candy.addEventListener("click",handleClick);
}

setInterval(gameLoop,200);
}

function handleClick(){

if(moves<=0)return;

if(!firstCandy){

firstCandy=this;
this.classList.add("selected");

}else{

let secondCandy=this;

swapCandies(firstCandy,secondCandy);

firstCandy.classList.remove("selected");
firstCandy=null;
}
}

function swapCandies(c1,c2){

const id1=parseInt(c1.dataset.id);
const id2=parseInt(c2.dataset.id);

const validMoves=[
id1-1,
id1+1,
id1-width,
id1+width
];

if(!validMoves.includes(id2)) return;

const color1=getColor(c1);
const color2=getColor(c2);

setColor(c1,color2);
setColor(c2,color1);

if(checkMatches()){

moves--;
document.getElementById("moves").innerText=moves;

}else{

setColor(c1,color1);
setColor(c2,color2);
}
}

function getColor(candy){

for(let color of colors){

if(candy.classList.contains(color)){
return color;
}
}
}

function setColor(candy,color){

candy.className="candy";
candy.classList.add(color);
}

function checkMatches(){

let matched=false;

for(let i=0;i<64;i++){

const row=[i,i+1,i+2];

if(i%8>5) continue;

const color=getColor(candies[i]);

if(
color &&
getColor(candies[i+1])===color &&
getColor(candies[i+2])===color
){

row.forEach(index=>{
candies[index].className="candy";
});

score+=10;
matched=true;
}
}

for(let i=0;i<48;i++){

const col=[i,i+8,i+16];

const color=getColor(candies[i]);

if(
color &&
getColor(candies[i+8])===color &&
getColor(candies[i+16])===color
){

col.forEach(index=>{
candies[index].className="candy";
});

score+=10;
matched=true;
}
}

document.getElementById("score").innerText=score;

return matched;
}

function moveDown(){

for(let i=55;i>=0;i--){

if(candies[i+8].className==="candy"){

candies[i+8].className=candies[i].className;
candies[i].className="candy";
}
}

for(let i=0;i<8;i++){

if(candies[i].className==="candy"){

candies[i].classList.add(randomColor());
}
}
}

function gameLoop(){

checkMatches();
moveDown();

if(moves<=0){

setTimeout(()=>{
alert("Game Over! Score: "+score);
location.reload();
},500);
}
}

createBoard();
</script>

</body>
</html>
